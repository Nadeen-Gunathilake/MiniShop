version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: minishop-mongo-dev
    ports:
      - "27017:27017"
    volumes:
      - mongo-data-dev:/data/db
    networks:
      - minishop-net-dev

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: minishop-server-dev
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/minishop
      - NODE_ENV=development
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      - mongo
    networks:
      - minishop-net-dev

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: minishop-client-dev
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server
    networks:
      - minishop-net-dev

volumes:
  mongo-data-dev:

networks:
  minishop-net-dev:
    driver: bridge
